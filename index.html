<!DOCTYPE html>
<html>
<head>
  <title>SPMS FINAL DASHBOARD</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color:white;
    }

    h2 {
      text-align:center;
      padding:10px;
      letter-spacing:2px;
    }

    .cards {
      display:grid;
      grid-template-columns: repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      padding:12px;
      border-radius:10px;
      text-align:center;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      box-shadow:0 0 15px rgba(0,0,0,0.4);
    }

    .green { background: linear-gradient(135deg,#1f4037,#99f2c8); }
    .yellow { background: linear-gradient(135deg,#f7971e,#ffd200); }
    .red { background: linear-gradient(135deg,#cb2d3e,#ef473a); }

    .card span { font-size:22px; font-weight:bold; }

    .grid {
      display:grid;
      grid-template-columns: 2fr 1fr;
      gap:10px;
      padding:10px;
    }

    canvas {
      background: rgba(255,255,255,0.05);
      border-radius:10px;
      padding:10px;
    }

    /* 🔥 TABLE */
    table {
      width:100%;
      border-collapse:collapse;
      font-size:12px;
      background: rgba(255,255,255,0.05);
      border-radius:10px;
      overflow:hidden;
    }

    th, td {
      padding:6px;
      text-align:center;
    }

    th {
      background: rgba(255,255,255,0.1);
    }

    tr:nth-child(even){
      background: rgba(255,255,255,0.05);
    }

    .rank {
      font-weight:bold;
      border-radius:50%;
      padding:5px;
      display:inline-block;
      width:20px;
    }

    .r1{background:#2ecc71;}
    .r2{background:#f1c40f;}
    .r3{background:#e67e22;}
    .r4,.r5,.r6{background:#e74c3c;}

  </style>
</head>

<body>

<h2>Q1 COMPLIANCE DASHBOARD</h2>

<div class="cards">
  <div class="card"><span id="total"></span><br>Total KPI</div>
  <div class="card green"><span id="reported"></span><br>On-Time</div>
  <div class="card yellow"><span id="late"></span><br>Late</div>
  <div class="card red"><span id="notReported"></span><br>Not Submitted</div>
  <div class="card"><span id="completion"></span><br>Completion</div>
</div>

<div class="grid">

  <canvas id="performanceChart"></canvas>

  <div>
    <canvas id="categoryChart"></canvas>
    <canvas id="statusChart"></canvas>
  </div>

</div>

<div style="padding:10px">
  <h3>Submission Ranking</h3>
  <table id="ranking">
    <thead>
      <tr>
        <th>Indicator</th>
        <th>Performance</th>
        <th>Rank</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtsHSDvB8iC3RSfJRmKf3MOkVb3LKkZ98aTxik3vDeOINaEFQW-4l_vTetjU05LszMK7cytmBq-i6n/pub?gid=959972291&single=true&output=tsv";

fetch(url)
.then(res=>res.text())
.then(data=>{

  const rows=data.split("\n").slice(1);

  let arr=[];
  let total=0,reported=0,notReported=0,late=0;
  let categoryMap={};

  rows.forEach(r=>{
    let c=r.split("\t");
    if(c.length<9)return;

    let perf=parseFloat(c[4])||0;
    let q=c[5];
    let status=c[8];
    let cat=c[1];

    if(q==="Q1"){
      total++;

      arr.push({label:c[2],value:perf});

      if(status==="Reported") reported++;
      else notReported++;

      if(perf<100 && perf>0) late++;

      if(!categoryMap[cat]) categoryMap[cat]=[];
      categoryMap[cat].push(perf);
    }
  });

  arr.sort((a,b)=>b.value-a.value);

  let top=arr.slice(0,8);

  document.getElementById("total").innerText=total;
  document.getElementById("reported").innerText=reported;
  document.getElementById("notReported").innerText=notReported;
  document.getElementById("late").innerText=late;
  document.getElementById("completion").innerText=((reported/total)*100).toFixed(1)+"%";

  // 🔥 CHART
  new Chart(document.getElementById("performanceChart"),{
    type:"bar",
    data:{
      labels:top.map(x=>x.label),
      datasets:[{data:top.map(x=>x.value)}]
    },
    options:{indexAxis:'y',plugins:{legend:{display:false}}}
  });

  // CATEGORY
  let cl=[],cv=[];
  for(let c in categoryMap){
    let avg=categoryMap[c].reduce((a,b)=>a+b,0)/categoryMap[c].length;
    cl.push(c); cv.push(avg.toFixed(1));
  }

  new Chart(document.getElementById("categoryChart"),{
    type:"pie",
    data:{labels:cl,datasets:[{data:cv}]}
  });

  new Chart(document.getElementById("statusChart"),{
    type:"pie",
    data:{
      labels:["Reported","Not"],
      datasets:[{data:[reported,notReported]}]
    }
  });

  // 🔥 RANKING TABLE
  let tbody=document.querySelector("#ranking tbody");

  arr.slice(0,6).forEach((x,i)=>{
    let rank=i+1;
    let cls="r"+rank;

    tbody.innerHTML+=`
      <tr>
        <td>${x.label}</td>
        <td>${x.value}%</td>
        <td><span class="rank ${cls}">${rank}</span></td>
      </tr>
    `;
  });

});
</script>

</body>
</html>
