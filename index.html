<!DOCTYPE html>
<html>
<head>
  <title>SPMS Pro Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family:'Segoe UI';
      background: radial-gradient(circle,#1f3b4d,#0f2027);
      color:white;
    }

    h1 {
      text-align:center;
      padding:15px;
      letter-spacing:2px;
    }

    /* KPI */
    .kpi {
      display:grid;
      grid-template-columns: repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      padding:15px;
      border-radius:12px;
      text-align:center;
      backdrop-filter: blur(10px);
      background: rgba(255,255,255,0.05);
      box-shadow:0 0 20px rgba(0,0,0,0.5);
    }

    .green { background: linear-gradient(135deg,#1f4037,#99f2c8); }
    .yellow { background: linear-gradient(135deg,#f7971e,#ffd200); }
    .red { background: linear-gradient(135deg,#cb2d3e,#ef473a); }

    .card span {
      font-size:28px;
      font-weight:bold;
    }

    /* GRID */
    .grid {
      display:grid;
      grid-template-columns: 2fr 1fr;
      gap:10px;
      padding:10px;
    }

    canvas {
      background: rgba(255,255,255,0.05);
      border-radius:10px;
      padding:10px;
    }

    /* TABLE */
    table {
      width:100%;
      border-collapse:collapse;
      margin-top:10px;
      font-size:12px;
    }

    th, td {
      padding:8px;
      text-align:center;
    }

    th {
      background: rgba(255,255,255,0.1);
    }

    .rank {
      padding:5px 10px;
      border-radius:50%;
      font-weight:bold;
    }

    .r1 { background:#2ecc71; }
    .r2 { background:#f1c40f; }
    .r3 { background:#e67e22; }

  </style>
</head>

<body>

<h1>Q1 COMPLIANCE DASHBOARD</h1>

<div class="kpi">
  <div class="card"><span id="kpi1">48%</span><br>Performance</div>
  <div class="card green"><span id="kpi2">42%</span><br>Compliance</div>
  <div class="card"><span id="kpi3">35%</span><br>On-Time</div>
  <div class="card yellow"><span id="kpi4">7%</span><br>Late</div>
  <div class="card red"><span id="kpi5">57%</span><br>Not Submitted</div>
</div>

<div class="grid">

  <canvas id="chart1"></canvas>

  <div>
    <canvas id="chart2"></canvas>
    <canvas id="chart3"></canvas>
  </div>

</div>

<div style="padding:10px">
  <table>
    <tr>
      <th>Department</th>
      <th>Performance</th>
      <th>Rank</th>
    </tr>

    <tr>
      <td>ER</td>
      <td>98.89%</td>
      <td><span class="rank r1">1</span></td>
    </tr>

    <tr>
      <td>PETRU</td>
      <td>42%</td>
      <td><span class="rank r2">2</span></td>
    </tr>

    <tr>
      <td>BILLING</td>
      <td>100%</td>
      <td><span class="rank r3">3</span></td>
    </tr>

  </table>
</div>

<script>
// 🔥 SAMPLE DATA
const labels = ["ER","Billing","IPCU","Lab","Nursing"];
const values = [98,100,100,99,95];

new Chart(chart1,{
  type:'bar',
  data:{labels:labels,datasets:[{data:values}]},
  options:{indexAxis:'y'}
});

new Chart(chart2,{
  type:'pie',
  data:{
    labels:["Strategic","Core","Support"],
    datasets:[{data:[30,50,20]}]
  }
});

new Chart(chart3,{
  type:'pie',
  data:{
    labels:["On-Time","Late","Not"],
    datasets:[{data:[60,10,30]}]
  }
});
</script>

</body>
</html>
