<!DOCTYPE html>
<html>
<head>
  <title>SPMS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>SPMS Dashboard (Q1 All Data)</h2>

<canvas id="chart" width="900" height="400"></canvas>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtsHSDvB8iC3RSfJRmKf3MOkVb3LKkZ98aTxik3vDeOINaEFQW-4l_vTetjU05LszMK7cytmBq-i6n/pub?gid=959972291&single=true&output=tsv";

fetch(url)
  .then(res => res.text())
  .then(data => {

    const rows = data.split("\n");

    // 🔥 HEADER (important)
    const headers = rows[0].split("\t");

    console.log("HEADERS:", headers);

    // 🔥 AUTO FIND COLUMN INDEX
    const indicatorIndex = headers.indexOf("INDICATOR");
    const performanceIndex = headers.indexOf("PERFORMANCE RATE");
    const quarterIndex = headers.indexOf("QUARTER");

    console.log("INDEX:", indicatorIndex, performanceIndex, quarterIndex);

    let labels = [];
    let values = [];

    rows.slice(1).forEach(row => {

      const cols = row.split("\t");

      if (cols.length < headers.length) return;

      const indicator = cols[indicatorIndex];
      const performance = parseFloat(cols[performanceIndex]) || 0;
      const quarter = cols[quarterIndex]?.trim();

      if (quarter === "Q1") {
        labels.push(indicator);
        values.push(performance);
      }

    });

    console.log("FINAL:", labels, values);

    new Chart(document.getElementById("chart"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Performance %",
          data: values
        }]
      }
    });

  });
</script>

</body>
</html>
