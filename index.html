<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITRMC Accomplishment Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .card-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <nav class="card-gradient p-6 text-white shadow-lg mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">ITRMC DASHBOARD</h1>
                <p class="text-blue-100 text-sm">Accomplishment Monitoring System</p>
            </div>
            <div class="text-right hidden md:block text-xs opacity-80">
                Data Source: Google Sheets API<br>
                Status: <span id="sync-status">Syncing...</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-blue-600">
                <p class="text-gray-500 text-xs font-bold uppercase">Total Indicators</p>
                <h2 id="stat-total" class="text-3xl font-black text-gray-800">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-green-500">
                <p class="text-gray-500 text-xs font-bold uppercase">Reported</p>
                <h2 id="stat-reported" class="text-3xl font-black text-green-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-yellow-500">
                <p class="text-gray-500 text-xs font-bold uppercase">On Time</p>
                <h2 id="stat-ontime" class="text-3xl font-black text-yellow-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-red-500">
                <p class="text-gray-500 text-xs font-bold uppercase">Pending</p>
                <h2 id="stat-pending" class="text-3xl font-black text-red-600">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="text-gray-700 font-bold mb-4 flex items-center">
                    <span class="w-2 h-2 bg-blue-600 rounded-full mr-2"></span>
                    Accomplishment Rate per Office (%)
                </h3>
                <canvas id="barChart" height="200"></canvas>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="text-gray-700 font-bold mb-4 flex items-center">
                    <span class="w-2 h-2 bg-blue-600 rounded-full mr-2"></span>
                    Submission Overview
                </h3>
                <div class="max-w-[300px] mx-auto">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY = 'YOUR_GOOGLE_API_KEY'; 
        const SHEET_ID = 'YOUR_SHEET_ID';
        const RANGE = 'Sheet1!A2:L100'; // Start from Row 2 to skip headers

        async function init() {
            try {
                const response = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${RANGE}?key=${API_KEY}`);
                const data = await response.json();
                const rows = data.values;

                if (!rows) return;

                // 1. Process Stats
                const total = rows.length;
                const reported = rows.filter(r => r[8] === 'Reported').length; // Column I (STATUS)
                const onTime = rows.filter(r => r[9] === 'On Time').length;     // Column J (DEADLINE)
                
                document.getElementById('stat-total').innerText = total;
                document.getElementById('stat-reported').innerText = reported;
                document.getElementById('stat-ontime').innerText = onTime;
                document.getElementById('stat-pending').innerText = total - reported;
                document.getElementById('sync-status').innerText = 'Connected';

                // 2. Bar Chart Data (Office vs Rate)
                const officeData = {};
                rows.forEach(r => {
                    const office = r[0]; // Column A
                    const rate = parseFloat(r[2]) || 0; // Column C (ACCOMPLISHMENT RATE)
                    if(r[8] === 'Reported') {
                        officeData[office] = rate;
                    }
                });

                new Chart(document.getElementById('barChart'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(officeData),
                        datasets: [{
                            label: 'Accomplishment %',
                            data: Object.values(officeData),
                            backgroundColor: '#3b82f6',
                            borderRadius: 8
                        }]
                    }
                });

                // 3. Pie Chart Data (Status)
                new Chart(document.getElementById('pieChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Reported', 'Not Reported'],
                        datasets: [{
                            data: [reported, total - reported],
                            backgroundColor: ['#10b981', '#ef4444']
                        }]
                    }
                });

            } catch (err) {
                console.error(err);
                document.getElementById('sync-status').innerText = 'Error';
            }
        }

        init();
    </script>
</body>
</html>
