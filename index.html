<!DOCTYPE html>
<html>
<head>
  <title>SPMS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin:0;
      font-family:'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
      color:white;
    }

    h2 {
      text-align:center;
      padding:10px;
      letter-spacing:2px;
    }

    /* KPI GRID */
    .cards {
      display:grid;
      grid-template-columns: repeat(5,1fr);
      gap:10px;
      padding:10px;
    }

    .card {
      padding:12px;
      border-radius:10px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      text-align:center;
      box-shadow:0 0 15px rgba(0,0,0,0.4);
    }

    .card h3 {
      font-size:12px;
      margin:0;
      opacity:0.8;
    }

    .card span {
      font-size:22px;
      font-weight:bold;
    }

    .green { background: linear-gradient(135deg,#1f4037,#99f2c8); }
    .yellow { background: linear-gradient(135deg,#f7971e,#ffd200); }
    .red { background: linear-gradient(135deg,#cb2d3e,#ef473a); }

    /* GRID */
    .grid {
      display:grid;
      grid-template-columns: 2fr 1fr;
      gap:10px;
      padding:10px;
    }

    canvas {
      background: rgba(255,255,255,0.05);
      border-radius:10px;
      padding:10px;
    }

  </style>
</head>

<body>

<h2>Q1 COMPLIANCE DASHBOARD</h2>

<!-- 🔥 KPI -->
<div class="cards">
  <div class="card">
    <h3>Total KPI</h3>
    <span id="total"></span>
  </div>

  <div class="card green">
    <h3>On-Time</h3>
    <span id="reported"></span>
  </div>

  <div class="card yellow">
    <h3>Late</h3>
    <span id="late"></span>
  </div>

  <div class="card red">
    <h3>Not Submitted</h3>
    <span id="notReported"></span>
  </div>

  <div class="card">
    <h3>Completion</h3>
    <span id="completion"></span>
  </div>
</div>

<div class="grid">

  <!-- PERFORMANCE -->
  <canvas id="performanceChart" height="250"></canvas>

  <div>
    <canvas id="categoryChart" height="120"></canvas>
    <canvas id="statusChart" height="120"></canvas>
  </div>

</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtsHSDvB8iC3RSfJRmKf3MOkVb3LKkZ98aTxik3vDeOINaEFQW-4l_vTetjU05LszMK7cytmBq-i6n/pub?gid=959972291&single=true&output=tsv";

fetch(url)
.then(res=>res.text())
.then(data=>{

  const rows = data.split("\n").slice(1);

  let labels=[], values=[];
  let total=0, reported=0, notReported=0, late=0;

  let categoryMap={};

  rows.forEach(row=>{
    const c=row.split("\t");
    if(c.length<9)return;

    let perf=parseFloat(c[4])||0;
    let q=c[5]?.trim();
    let cat=c[1];
    let status=c[8];

    if(q==="Q1"){
      total++;
      labels.push(c[2]);
      values.push(perf);

      if(status==="Reported") reported++;
      else notReported++;

      // fake late logic (pwede mo palitan later)
      if(perf<100 && perf>0) late++;

      if(!categoryMap[cat]) categoryMap[cat]=[];
      categoryMap[cat].push(perf);
    }
  });

  // TOP 8
  let comb=labels.map((l,i)=>({l,v:values[i]}));
  comb.sort((a,b)=>b.v-a.v);
  comb=comb.slice(0,8);

  labels=comb.map(x=>x.l);
  values=comb.map(x=>x.v);

  // KPI
  document.getElementById("total").innerText=total;
  document.getElementById("reported").innerText=reported;
  document.getElementById("notReported").innerText=notReported;
  document.getElementById("late").innerText=late;
  document.getElementById("completion").innerText=((reported/total)*100).toFixed(1)+"%";

  // CHART
  new Chart(document.getElementById("performanceChart"),{
    type:"bar",
    data:{labels:labels,datasets:[{data:values}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}}}
  });

  // CATEGORY
  let cl=[],cv=[];
  for(let c in categoryMap){
    let avg=categoryMap[c].reduce((a,b)=>a+b,0)/categoryMap[c].length;
    cl.push(c); cv.push(avg.toFixed(1));
  }

  new Chart(document.getElementById("categoryChart"),{
    type:"bar",
    data:{labels:cl,datasets:[{data:cv}]},
    options:{plugins:{legend:{display:false}}}
  });

  // STATUS PIE
  new Chart(document.getElementById("statusChart"),{
    type:"pie",
    data:{
      labels:["Reported","Not"],
      datasets:[{data:[reported,notReported]}]
    }
  });

});
</script>

</body>
</html>
