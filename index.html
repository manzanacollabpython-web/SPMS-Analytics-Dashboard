<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITRMC DASHBOARD - Q1 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .card-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <nav class="card-gradient p-6 text-white shadow-lg mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight uppercase">ITRMC DASHBOARD</h1>
                <p class="text-blue-100 text-sm">Accomplishment Monitoring | FY 2026 - Q1</p>
            </div>
            <div class="text-right text-xs opacity-80">
                Status: <span id="sync-status" class="font-bold">INITIALIZING...</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Total Indicators (Q1)</p>
                <h2 id="stat-total" class="text-4xl font-black text-gray-800 tracking-tighter">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-green-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Reported</p>
                <h2 id="stat-reported" class="text-4xl font-black text-green-600 tracking-tighter">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-yellow-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">On Time</p>
                <h2 id="stat-ontime" class="text-4xl font-black text-yellow-600 tracking-tighter">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-red-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Pending</p>
                <h2 id="stat-pending" class="text-4xl font-black text-red-600 tracking-tighter">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="text-gray-700 font-bold mb-4 flex items-center italic">
                    <span class="w-2 h-2 bg-blue-600 rounded-full mr-2"></span>
                    Avg Accomplishment per Division (%)
                </h3>
                <div class="relative" style="height:400px">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="text-gray-700 font-bold mb-4 flex items-center italic">
                    <span class="w-2 h-2 bg-blue-600 rounded-full mr-2"></span>
                    Submission Overview (Q1)
                </h3>
                <div class="max-w-[300px] mx-auto mt-10">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_LINK = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk0F8K5bfpkZ6Q8JUoDBZ68NqTfiW-r8F9s165g7inDSvnVwrQNBU8Dlw2WPOPeqzVCxSl3Emuix4E/pub?gid=890592255&single=true&output=csv&cache=' + Date.now();

        let barChartInstance = null;
        let pieChartInstance = null;

        function loadData() {
            document.getElementById('sync-status').innerText = 'LOADING...';
            
            Papa.parse(CSV_LINK, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    // Filter: Kunin lang ang Q1 at YEAR 2026 para lumabas ang 14 indicators
                    const allRows = results.data;
                    const q1Rows = allRows.filter(r => 
                        r.QUARTER === 'Q1' && 
                        r.YEAR === '2026' &&
                        r.OFFICE && r.OFFICE.trim() !== ""
                    );
                    
                    if (q1Rows.length > 0) {
                        updateDashboard(q1Rows);
                        document.getElementById('sync-status').innerText = 'LIVE';
                        document.getElementById('sync-status').className = 'text-green-400 font-bold';
                    } else {
                        document.getElementById('sync-status').innerText = 'NO Q1 2026 DATA FOUND';
                    }
                },
                error: function(err) {
                    document.getElementById('sync-status').innerText = 'OFFLINE / ERROR';
                }
            });
        }

        function updateDashboard(rows) {
            const reportedRows = rows.filter(r => r.STATUS === 'Reported');
            const totalCount = rows.length;
            const reportedCount = reportedRows.length;
            const onTimeCount = rows.filter(r => r['WITHIN DEADLINE'] === 'On Time').length;

            // Stats Update
            document.getElementById('stat-total').innerText = totalCount;
            document.getElementById('stat-reported').innerText = reportedCount;
            document.getElementById('stat-ontime').innerText = onTimeCount;
            document.getElementById('stat-pending').innerText = totalCount - reportedCount;

            // Grouping Logic for Average per Division
            const grouped = {};
            reportedRows.forEach(r => {
                const office = r.OFFICE.trim();
                const rawRate = r['ACCOMPLISHMENT RATE'] || "0";
                const rate = parseFloat(rawRate.replace('%', '')) || 0;
                
                if (!grouped[office]) grouped[office] = { sum: 0, count: 0 };
                grouped[office].sum += rate;
                grouped[office].count += 1;
            });

            const labels = Object.keys(grouped);
            const averages = labels.map(l => (grouped[l].sum / grouped[l].count).toFixed(1));

            // Render/Update Bar Chart
            if(barChartInstance) barChartInstance.destroy();
            barChartInstance = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Avg Accomplishment %',
                        data: averages,
                        backgroundColor: '#1e40af',
                        borderRadius: 8
                    }]
                },
                options: { 
                    indexAxis: 'y', 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { beginAtZero: true, max: 100 } }
                }
            });

            // Render/Update Pie Chart
            if(pieChartInstance) pieChartInstance.destroy();
            pieChartInstance = new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Reported', 'Pending'],
                    datasets: [{
                        data: [reportedCount, totalCount - reportedCount],
                        backgroundColor: ['#10b981', '#f87171'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '70%' }
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
