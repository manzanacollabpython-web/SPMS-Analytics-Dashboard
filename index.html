<!DOCTYPE html>
<html>
<head>
  <title>SPMS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>SPMS Dashboard (Q1 Performance)</h2>

<canvas id="chart" width="800" height="400"></canvas>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtsHSDvB8iC3RSfJRmKf3MOkVb3LKkZ98aTxik3vDeOINaEFQW-4l_vTetjU05LszMK7cytmBq-i6n/pub?gid=959972291&single=true&output=csv";

// 🔥 CSV parser (handles commas properly)
function parseCSV(text) {
  const rows = text.split("\n");
  return rows.map(row => {
    const result = [];
    let current = '';
    let inQuotes = false;

    for (let char of row) {
      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        result.push(current);
        current = '';
      } else {
        current += char;
      }
    }
    result.push(current);
    return result;
  });
}

fetch(csvUrl)
  .then(res => res.text())
  .then(data => {

    const rows = parseCSV(data).slice(1);

    let labels = [];
    let values = [];

    rows.forEach(cols => {

      if (cols.length < 8) return;

      const indicator = cols[1]?.trim();
      const performance = parseFloat(cols[3]);
      const quarter = cols[4]?.trim();
      const status = cols[7]?.trim().toLowerCase();

      if (
        quarter === "Q1" &&
        status === "reported" &&
        !isNaN(performance)
      ) {
        labels.push(indicator);
        values.push(performance);
      }

    });

    console.log("DATA:", labels, values);

    new Chart(document.getElementById("chart"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Performance %",
          data: values
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

  });
</script>

</body>
</html>
