<!DOCTYPE html>
<html>
<head>
  <title>SPMS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color:white;
}

/* TITLE */
h2 {
  text-align:center;
  margin:15px;
  font-weight:600;
  letter-spacing:1px;
}

/* KPI CARDS */
.cards {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  border-radius:10px;
  padding:12px;
  text-align:center;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

.card span {
  display:block;
  font-size:22px;
  font-weight:bold;
  margin-top:5px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:10px;
  padding:10px;
}

/* CHART BOX */
canvas {
  background: rgba(255,255,255,0.05);
  border-radius:10px;
  padding:10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

  </style>
</head>
<body>

<h2>Q1 SPMS DASHBOARD</h2>

<!-- 🔥 KPI -->
<div class="cards">
  <div class="card">Total<span id="total"></span></div>
  <div class="card">Reported<span id="reported"></span></div>
  <div class="card">Not Reported<span id="notReported"></span></div>
  <div class="card">Completion<span id="completion"></span></div>
</div>

<div class="grid">

  <!-- 🔥 TOP PERFORMANCE -->
  <canvas id="performanceChart" height="250"></canvas>

  <div>
    <canvas id="categoryChart" height="120"></canvas>
    <canvas id="statusChart" height="120"></canvas>
  </div>

</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtsHSDvB8iC3RSfJRmKf3MOkVb3LKkZ98aTxik3vDeOINaEFQW-4l_vTetjU05LszMK7cytmBq-i6n/pub?gid=959972291&single=true&output=tsv";

fetch(url)
.then(res => res.text())
.then(data => {

  const rows = data.split("\n").slice(1);

  let labels = [];
  let values = [];

  let total = 0, reported = 0, notReported = 0;
  let categoryMap = {};

  rows.forEach(row => {

    const cols = row.split("\t");
    if (cols.length < 9) return;

    const indicator = cols[2];
    const performance = parseFloat(cols[4]) || 0;
    const quarter = cols[5]?.trim();
    const category = cols[1];
    const status = cols[8]?.trim();

    if (quarter === "Q1") {

      total++;
      labels.push(indicator);
      values.push(performance);

      if (status === "Reported") reported++;
      else notReported++;

      if (!categoryMap[category]) categoryMap[category] = [];
      categoryMap[category].push(performance);
    }

  });

  // 🔥 TOP 8 LANG para kasya
  let combined = labels.map((l,i)=>({l,v:values[i]}));
  combined.sort((a,b)=>b.v-a.v);
  combined = combined.slice(0,8);

  labels = combined.map(x=>x.l);
  values = combined.map(x=>x.v);

  // KPI
  document.getElementById("total").innerText = total;
  document.getElementById("reported").innerText = reported;
  document.getElementById("notReported").innerText = notReported;
  document.getElementById("completion").innerText = ((reported/total)*100).toFixed(1)+"%";

  // 🔥 PERFORMANCE
  new Chart(document.getElementById("performanceChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{ data: values }]
    },
    options: {
      indexAxis:'y',
      plugins:{ legend:{display:false}},
      scales:{ x:{beginAtZero:true}}
    }
  });

  // 🔥 CATEGORY
  let catL=[], catV=[];
  for (let c in categoryMap){
    let avg = categoryMap[c].reduce((a,b)=>a+b,0)/categoryMap[c].length;
    catL.push(c);
    catV.push(avg.toFixed(1));
  }

  new Chart(document.getElementById("categoryChart"), {
    type: "bar",
    data: { labels: catL, datasets:[{data:catV}] },
    options:{ plugins:{legend:{display:false}} }
  });

  // 🔥 STATUS
  new Chart(document.getElementById("statusChart"), {
    type: "pie",
    data: {
      labels:["Reported","Not"],
      datasets:[{data:[reported,notReported]}]
    }
  });

});
</script>

</body>
</html>
