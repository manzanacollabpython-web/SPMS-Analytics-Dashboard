                    <div>
                        <h1 class="text-lg font-black tracking-tight text-[#f0f6fc]">ITRMC DASHBOARD</h1>

        </div>

        <div id="view-annual" class="view-section hidden p-8">

                <p class="text-sm text-[#8b949e]">Yearly Consolidation of Accomplishments</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="dashboard-card p-6 border-l-4 border-l-[#8957e5]">
                    <p class="text-[10px] font-bold text-[#8b949e] uppercase">Annual Average</p>
                    <h2 id="annual-avg" class="text-4xl font-black text-[#f0f6fc]">0.00%</h2>
                </div>
                <div class="dashboard-card p-6 border-l-4 border-l-[#3fb950]">

                <div class="dashboard-card p-6 border-l-4 border-l-[#f2cc60]">
                    <p class="text-[10px] font-bold text-[#8b949e] uppercase">Overall Compliance</p>
                    <h2 id="annual-compliance" class="text-4xl font-black text-[#f0f6fc]">0%</h2>
                </div>
            </div>

            <div class="dashboard-card p-6 mb-8 h-[400px]">
                <h3 class="text-xs font-bold text-[#8b949e] uppercase mb-4">Quarterly Growth Comparison</h3>
                <canvas id="annualChart"></canvas>
            </div>

            <div class="dashboard-card overflow-hidden">
                <div class="p-4 bg-[#21262d] border-b border-[#30363d]">

                            <th class="p-4">Q3</th>
                            <th class="p-4">Q4</th>
                            <th class="p-4 font-bold text-white">Annual Avg</th>
                        </tr>
                    </thead>
                    <tbody id="annual-table-body" class="divide-y divide-[#30363d]">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // FUNCTION PARA MAG-LIPAT NG VIEW
        function switchView(viewName) {
            // Itago lahat ng sections
            document.querySelectorAll('.view-section').forEach(section => section.classList.add('hidden'));
            // Alisin ang active style sa lahat ng buttons
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('text-[#58a6ff]', 'bg-[#21262d]');
                btn.classList.add('text-[#8b949e]');
            });

            // Ipakita ang napiling section
            document.getElementById('view-' + viewName).classList.remove('hidden');
            // I-highlight ang active button
            const activeBtn = document.getElementById('btn-' + viewName);
            activeBtn.classList.add('text-[#58a6ff]', 'bg-[#21262d]');
            activeBtn.classList.remove('text-[#8b949e]');

            if(viewName === 'annual') {
                renderAnnualData();
            }
        }
