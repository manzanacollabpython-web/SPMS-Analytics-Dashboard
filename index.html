<!DOCTYPE html>
<html>
<head>
  <title>SPMS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>SPMS Dashboard (Q1 Performance)</h2>

<canvas id="chart" width="600" height="300"></canvas>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtsHSDvB8iC3RSfJRmKf3MOkVb3LKkZ98aTxik3vDeOINaEFQW-4l_vTetjU05LszMK7cytmBq-i6n/pub?gid=959972291&single=true&output=csv";

fetch(csvUrl)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);

    let labels = [];
    let values = [];

    rows.forEach(row => {
      const cols = row.split(",");

      const indicator = cols[1];
      const performance = parseFloat(cols[3]);
      const quarter = cols[4];
      const status = cols[7];

      if (quarter === "Q1" && status === "Reported") {
        labels.push(indicator);
        values.push(performance);
      }
    });

    new Chart(document.getElementById("chart"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Performance %",
          data: values
        }]
      }
    });
  });
</script>

</body>
</html>
