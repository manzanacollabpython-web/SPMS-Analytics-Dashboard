<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITRMC DASHBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <nav class="bg-[#2d5ebd] p-5 text-white shadow-md mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-wide">ITRMC DASHBOARD</h1>
                <p class="text-sm text-blue-100">Accomplishment Monitoring System</p>
            </div>
            <div class="text-right text-xs opacity-90">
                Data Source: Google Sheets CSV<br>
                Status: <span id="sync-status" class="font-bold text-yellow-300">Syncing...</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow-sm border-b-4 border-blue-500">
                <p class="text-gray-500 text-xs font-bold uppercase mb-2">Total Indicators</p>
                <h2 id="stat-total" class="text-3xl font-black text-gray-800">0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-b-4 border-green-500">
                <p class="text-gray-500 text-xs font-bold uppercase mb-2">Reported</p>
                <h2 id="stat-reported" class="text-3xl font-black text-green-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-b-4 border-yellow-500">
                <p class="text-gray-500 text-xs font-bold uppercase mb-2">On Time</p>
                <h2 id="stat-ontime" class="text-3xl font-black text-yellow-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-b-4 border-red-500">
                <p class="text-gray-500 text-xs font-bold uppercase mb-2">Pending</p>
                <h2 id="stat-pending" class="text-3xl font-black text-red-600">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <h3 class="text-gray-700 font-bold mb-6 flex items-center text-sm">
                    <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span>
                    Accomplishment Rate per Office (%)
                </h3>
                <div class="relative" style="height:350px">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm">
                <h3 class="text-gray-700 font-bold mb-6 flex items-center text-sm">
                    <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span>
                    Submission Overview
                </h3>
                <div class="max-w-[250px] mx-auto mt-4">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // I-REGISTER ANG PLUGIN PARA SIGURADONG GAGANA
        Chart.register(ChartDataLabels);

        const CSV_LINK = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk0F8K5bfpkZ6Q8JUoDBZ68NqTfiW-r8F9s165g7inDSvnVwrQNBU8Dlw2WPOPeqzVCxSl3Emuix4E/pub?gid=890592255&single=true&output=csv&cache=' + Date.now();

        let charts = {};

        function init() {
            Papa.parse(CSV_LINK, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    
                    const validRows = data.filter(r => {
                        const q = (r.QUARTER || "").trim().toUpperCase();
                        const y = (r.YEAR || "").trim();
                        const rate = (r['ACCOMPLISHMENT RATE'] || "").trim();

                        return q === 'Q1' && y === '2026' && rate !== "";
                    });

                    if (validRows.length > 0) {
                        updateDashboard(validRows);
                        document.getElementById('sync-status').innerText = 'Data Loaded';
                        document.getElementById('sync-status').className = 'font-bold text-green-300';
                    } else {
                        document.getElementById('sync-status').innerText = 'Error: No Data Found';
                    }
                }
            });
        }

        function updateDashboard(rows) {
            const total = rows.length; 
            const reported = rows.filter(r => (r.STATUS || "").trim() === 'Reported').length;
            const onTime = rows.filter(r => (r['WITHIN DEADLINE'] || "").trim() === 'On Time').length;
            const pending = total - reported;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-reported').innerText = reported;
            document.getElementById('stat-ontime').innerText = onTime;
            document.getElementById('stat-pending').innerText = pending;

            const grouped = {};
            rows.forEach(r => {
                const office = (r.OFFICE || "Unknown").trim();
                const rate = parseFloat((r['ACCOMPLISHMENT RATE'] || "0").replace('%', '')) || 0;
                
                if (!grouped[office]) grouped[office] = { sum: 0, count: 0 };
                grouped[office].sum += rate;
                grouped[office].count += 1;
            });

            const labels = Object.keys(grouped);
            const dataValues = labels.map(l => (grouped[l].sum / grouped[l].count).toFixed(2));

            renderCharts(labels, dataValues, reported, pending);
        }

        function renderCharts(labels, dataValues, reported, pending) {
            if(charts.bar) charts.bar.destroy();
            if(charts.pie) charts.pie.destroy();

            // Bar Chart
            charts.bar = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Average Rate (%)',
                        data: dataValues,
                        backgroundColor: '#3b82f6', 
                        borderRadius: 4
                    }]
                },
                options: { 
                    indexAxis: 'y', 
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { display: false },
                        // DITO NAKA-SET YUNG LABEL SA DULO NG BAR
                        datalabels: {
                            anchor: 'end',
                            align: 'right', // Para sa labas ng mismong tip ng bar
                            color: '#1e3a8a',
                            font: { weight: 'bold', size: 12 },
                            formatter: function(value) {
                                return value + '%'; // Dinadagdag ang percent sign
                            }
                        }
                    },
                    scales: { 
                        x: { 
                            beginAtZero: true,
                            grace: '20%' // Nagbibigay ng extra space sa kanan para di maputol yung percentage number
                        } 
                    }
                }
            });

            // Pie Chart
            charts.pie = new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Reported', 'Pending'],
                    datasets: [{
                        data: [reported, pending],
                        backgroundColor: ['#22c55e', '#ef4444'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    cutout: '75%', 
                    plugins: { 
                        legend: { position: 'bottom' },
                        // Pinatay ang datalabels sa pie chart para hindi makalat tingnan
                        datalabels: { display: false } 
                    } 
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
