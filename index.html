<!DOCTYPE html>
<html>
<head>
  <title>SPMS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; margin:20px; }
    h2 { margin-bottom:10px; }

    .cards {
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .card {
      flex:1;
      padding:15px;
      background:#f4f4f4;
      border-radius:8px;
      text-align:center;
      font-weight:bold;
    }

    .grid {
      display:grid;
      grid-template-columns: 2fr 1fr;
      gap:20px;
    }

    canvas {
      background:#fff;
      border-radius:10px;
      padding:10px;
    }
  </style>
</head>
<body>

<h2>SPMS Dashboard (Q1)</h2>

<!-- 🔥 KPI CARDS -->
<div class="cards">
  <div class="card" id="total">Total: 0</div>
  <div class="card" id="reported">Reported: 0</div>
  <div class="card" id="notReported">Not Reported: 0</div>
  <div class="card" id="completion">Completion: 0%</div>
</div>

<div class="grid">

  <!-- 🔥 TOP 10 PERFORMANCE -->
  <canvas id="performanceChart"></canvas>

  <div>
    <!-- 🔥 CATEGORY -->
    <canvas id="categoryChart"></canvas>

    <!-- 🔥 STATUS -->
    <canvas id="statusChart"></canvas>
  </div>

</div>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtsHSDvB8iC3RSfJRmKf3MOkVb3LKkZ98aTxik3vDeOINaEFQW-4l_vTetjU05LszMK7cytmBq-i6n/pub?gid=959972291&single=true&output=tsv";

fetch(url)
.then(res => res.text())
.then(data => {

  const rows = data.split("\n").slice(1);

  let labels = [];
  let values = [];

  let total = 0;
  let reported = 0;
  let notReported = 0;

  let categoryMap = {};

  rows.forEach(row => {

    const cols = row.split("\t");
    if (cols.length < 9) return;

    const indicator = cols[2];
    const performance = parseFloat(cols[4]) || 0;
    const quarter = cols[5]?.trim();
    const category = cols[1];
    const status = cols[8]?.trim();

    if (quarter === "Q1") {

      total++;

      labels.push(indicator);
      values.push(performance);

      if (status === "Reported") {
        reported++;
      } else {
        notReported++;
      }

      if (!categoryMap[category]) {
        categoryMap[category] = [];
      }
      categoryMap[category].push(performance);
    }

  });

  // 🔥 TOP 10 FILTER
  let combined = labels.map((label, i) => ({
    label: label,
    value: values[i]
  }));

  combined.sort((a, b) => b.value - a.value);
  combined = combined.slice(0, 10);

  labels = combined.map(x => x.label);
  values = combined.map(x => x.value);

  // 🔥 KPI
  const completionRate = total > 0 ? ((reported / total) * 100).toFixed(1) : 0;

  document.getElementById("total").innerText = "Total: " + total;
  document.getElementById("reported").innerText = "Reported: " + reported;
  document.getElementById("notReported").innerText = "Not Reported: " + notReported;
  document.getElementById("completion").innerText = "Completion: " + completionRate + "%";

  // 🔥 PERFORMANCE CHART (TOP 10)
  new Chart(document.getElementById("performanceChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Top 10 Performance %",
        data: values
      }]
    },
    options: {
      indexAxis: 'y',
      responsive: true,
      scales: {
        x: { beginAtZero: true }
      }
    }
  });

  // 🔥 CATEGORY CHART
  let catLabels = [];
  let catValues = [];

  for (let cat in categoryMap) {
    const arr = categoryMap[cat];
    const avg = arr.reduce((a,b)=>a+b,0) / arr.length;
    catLabels.push(cat);
    catValues.push(avg.toFixed(2));
  }

  new Chart(document.getElementById("categoryChart"), {
    type: "bar",
    data: {
      labels: catLabels,
      datasets: [{
        label: "Category Avg",
        data: catValues
      }]
    }
  });

  // 🔥 STATUS CHART
  new Chart(document.getElementById("statusChart"), {
    type: "pie",
    data: {
      labels: ["Reported", "Not Reported"],
      datasets: [{
        data: [reported, notReported]
      }]
    }
  });

});
</script>

</body>
</html>
