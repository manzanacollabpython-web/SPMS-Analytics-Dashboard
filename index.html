<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITRMC Performance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <nav class="bg-blue-800 p-6 text-white shadow-lg mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">ITRMC DASHBOARD</h1>
                <p class="text-blue-100 text-sm italic">Accomplishment Monitoring System</p>
            </div>
            <div id="sync-status" class="text-xs opacity-75">Syncing CSV...</div>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl shadow border-b-4 border-blue-500">
                <p class="text-xs font-bold text-gray-500 uppercase">Total Indicators</p>
                <h2 id="stat-total" class="text-3xl font-black text-gray-800">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow border-b-4 border-green-500">
                <p class="text-xs font-bold text-gray-500 uppercase">Reported</p>
                <h2 id="stat-reported" class="text-3xl font-black text-green-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow border-b-4 border-yellow-500">
                <p class="text-xs font-bold text-gray-500 uppercase">On Time</p>
                <h2 id="stat-ontime" class="text-3xl font-black text-yellow-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow border-b-4 border-red-500">
                <p class="text-xs font-bold text-gray-500 uppercase">Pending</p>
                <h2 id="stat-pending" class="text-3xl font-black text-red-600">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="text-gray-700 font-bold mb-4">Accomplishment Per Office (%)</h3>
                <canvas id="barChart" height="200"></canvas>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col items-center">
                <h3 class="text-gray-700 font-bold mb-4 w-full text-left">Submission Overview</h3>
                <div class="max-w-[300px]">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk0F8K5bfpkZ6Q8JUoDBZ68NqTfiW-r8F9s165g7inDSvnVwrQNBU8Dlw2WPOPeqzVCxSl3Emuix4E/pub?gid=890592255&single=true&output=csv';

        function fetchData() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                complete: function(results) {
                    const rows = results.data.filter(r => r.OFFICE); // Linisin ang rows
                    updateDashboard(rows);
                    document.getElementById('sync-status').innerText = 'Data Live';
                }
            });
        }

        function updateDashboard(rows) {
            const reported = rows.filter(r => r.STATUS === 'Reported').length;
            const onTime = rows.filter(r => r['WITHIN DEADLINE'] === 'On Time').length;
            const total = rows.length;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-reported').innerText = reported;
            document.getElementById('stat-ontime').innerText = onTime;
            document.getElementById('stat-pending').innerText = total - reported;

            // Bar Chart
            const reportedRows = rows.filter(r => r.STATUS === 'Reported');
            const officeLabels = reportedRows.map(r => r.OFFICE);
            const rates = reportedRows.map(r => parseFloat(r['ACCOMPLISHMENT RATE'].replace('%', '')) || 0);

            new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: officeLabels,
                    datasets: [{
                        label: 'Rate %',
                        data: rates,
                        backgroundColor: '#1e40af',
                        borderRadius: 5
                    }]
                },
                options: { indexAxis: 'y' }
            });

            // Pie Chart
            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Reported', 'Pending'],
                    datasets: [{
                        data: [reported, total - reported],
                        backgroundColor: ['#10b981', '#f87171']
                    }]
                }
            });
        }

        fetchData();
    </script>
</body>
</html>
