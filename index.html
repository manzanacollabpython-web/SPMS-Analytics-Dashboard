<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITRMC DASHBOARD - Q1 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        .card-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-10">

    <nav class="card-gradient p-6 text-white shadow-lg mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-tight uppercase text-white">ITRMC DASHBOARD</h1>
                <p class="text-blue-100 text-sm font-medium">Q1 2026 Monitoring | Performance Tracking</p>
            </div>
            <div class="text-right text-xs opacity-90 font-mono">
                STATUS: <span id="sync-status" class="bg-blue-900 px-2 py-1 rounded">CHECKING...</span>
            </div>
        </div>
    </nav>

    <div class="container mx-auto px-4">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-blue-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Total Q1 Indicators</p>
                <h2 id="stat-total" class="text-4xl font-black text-gray-800">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-green-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Reported</p>
                <h2 id="stat-reported" class="text-4xl font-black text-green-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-yellow-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">On Time</p>
                <h2 id="stat-ontime" class="text-4xl font-black text-yellow-600">0</h2>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border-b-4 border-red-500 text-center">
                <p class="text-gray-500 text-xs font-bold uppercase">Pending/Late</p>
                <h2 id="stat-pending" class="text-4xl font-black text-red-600">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-2xl shadow-sm">
                <h3 class="text-gray-700 font-bold mb-4 flex items-center italic">
                    <span class="w-3 h-3 bg-blue-600 rounded-full mr-2"></span>
                    Performance per Office (Q1 2026)
                </h3>
                <div class="relative" style="height:450px">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm flex flex-col items-center">
                <h3 class="text-gray-700 font-bold mb-4 w-full text-left italic">
                    <span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span>
                    Submission Status Overview
                </h3>
                <div class="max-w-[300px] w-full mt-10">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_LINK = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSk0F8K5bfpkZ6Q8JUoDBZ68NqTfiW-r8F9s165g7inDSvnVwrQNBU8Dlw2WPOPeqzVCxSl3Emuix4E/pub?gid=890592255&single=true&output=csv&cache=' + Date.now();

        let barChartInstance = null;
        let pieChartInstance = null;

        function init() {
            document.getElementById('sync-status').innerText = 'LOADING...';
            
            Papa.parse(CSV_LINK, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const allData = results.data;
                    
                    // --- ANG ULTIMATE FILTER MO ---
                    const validRows = allData.filter(r => {
                        const q = (r.QUARTER || "").trim().toUpperCase();
                        const y = (r.YEAR || "").trim();
                        const rate = (r['ACCOMPLISHMENT RATE'] || "").trim();
                        const office = (r.OFFICE || "").trim();

                        // Tignan kung pasok sa lahat ng requirements:
                        const isQ1 = (q === 'Q1');
                        const is2026 = (y === '2026');
                        const hasOffice = (office !== "");
                        const hasRate = (rate !== "" && rate !== "0" && rate !== "Not Reported"); // DAPAT MAY LAMAN

                        return isQ1 && is2026 && hasOffice && hasRate;
                    });

                    if (validRows.length > 0) {
                        updateDashboard(validRows);
                        document.getElementById('sync-status').innerText = 'LIVE (STRICT FILTER)';
                        document.getElementById('sync-status').className = 'text-green-400 font-bold';
                    } else {
                        document.getElementById('stat-total').innerText = "0";
                        document.getElementById('sync-status').innerText = 'NO VALID DATA';
                    }
                }
            });
        }

        function updateDashboard(rows) {
            const total = rows.length; 
            const reported = rows.filter(r => (r.STATUS || "").trim() === 'Reported').length;
            const onTime = rows.filter(r => (r['WITHIN DEADLINE'] || "").trim() === 'On Time').length;

            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-reported').innerText = reported;
            document.getElementById('stat-ontime').innerText = onTime;
            document.getElementById('stat-pending').innerText = total - reported;

            // Grouping for Bar Chart (Averaging)
            const grouped = {};
            rows.forEach(r => {
                // Babasahin lang yung rate kung status ay Reported
                if ((r.STATUS || "").trim() === 'Reported') {
                    const office = r.OFFICE.trim();
                    const rate = parseFloat((r['ACCOMPLISHMENT RATE'] || "0").replace('%', '')) || 0;
                    
                    if (!grouped[office]) grouped[office] = { sum: 0, count: 0 };
                    grouped[office].sum += rate;
                    grouped[office].count += 1;
                }
            });

            const labels = Object.keys(grouped);
            const dataValues = labels.map(l => (grouped[l].sum / grouped[l].count).toFixed(1));

            renderCharts(labels, dataValues, reported, total);
        }

        function renderCharts(labels, dataValues, reported, total) {
            if(barChartInstance) barChartInstance.destroy();
            if(pieChartInstance) pieChartInstance.destroy();

            // Bar Chart
            barChartInstance = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Avg Accomplishment %',
                        data: dataValues,
                        backgroundColor: '#2563eb',
                        borderRadius: 5
                    }]
                },
                options: { 
                    indexAxis: 'y', 
                    maintainAspectRatio: false,
                    scales: { x: { beginAtZero: true, max: 100 } }
                }
            });

            // Pie Chart
            pieChartInstance = new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Reported', 'Pending'],
                    datasets: [{
                        data: [reported, total - reported],
                        backgroundColor: ['#10b981', '#f87171'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '70%' }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
