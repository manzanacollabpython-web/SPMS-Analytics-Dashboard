<!DOCTYPE html>
<html>
<head>
  <title>SPMS Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>SPMS Dashboard (Q1 All Data)</h2>

<canvas id="chart" width="900" height="400"></canvas>

<script>
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQtsHSDvB8iC3RSfJRmKf3MOkVb3LKkZ98aTxik3vDeOINaEFQW-4l_vTetjU05LszMK7cytmBq-i6n/pub?gid=959972291&single=true&output=tsv";

fetch(url)
  .then(res => res.text())
  .then(data => {

    const rows = data.split("\n").slice(1);

    let labels = [];
    let values = [];

    rows.forEach(row => {

      const cols = row.split("\t");

      if (cols.length < 10) return;

      const indicator = cols[1];
      const performance = parseFloat(cols[3]) || 0;

      const quarter = cols[4]?.trim();
      const status = cols[7]?.trim();

      console.log("Q:", quarter, "| Status:", status, "| Perf:", performance);

      // 🔥 FINAL FILTER
      if (quarter === "Q1") {
        labels.push(indicator);
        values.push(performance);
      }

    });

    console.log("FINAL:", labels, values);

    new Chart(document.getElementById("chart"), {
      type: "bar",
      data: {
        labels: labels,
        datasets: [{
          label: "Performance %",
          data: values
        }]
      },
      options: {
        responsive: true,
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

  });
</script>

</body>
</html>
