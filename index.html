<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SPMS Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background: radial-gradient(circle,#1e3c48,#0f2027);
  color:white;
  overflow:hidden; /* 🔥 NO SCROLL */
}

/* TITLE */
h1{
  text-align:center;
  margin:10px;
  letter-spacing:2px;
}

/* KPI */
.kpi{
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:8px;
  padding:8px;
}

.card{
  padding:12px;
  border-radius:10px;
  text-align:center;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  box-shadow:0 0 15px rgba(0,0,0,0.6);
}

.green{ background: linear-gradient(135deg,#134e5e,#71b280); }
.yellow{ background: linear-gradient(135deg,#f7971e,#ffd200); }
.red{ background: linear-gradient(135deg,#cb2d3e,#ef473a); }

.card span{
  font-size:20px;
  font-weight:bold;
}

/* GRID MAIN */
.main{
  display:grid;
  grid-template-columns: 2fr 1fr;
  gap:8px;
  padding:8px;
  height:55vh;
}

/* PANELS */
.panel{
  background: rgba(255,255,255,0.05);
  border-radius:10px;
  padding:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

canvas{
  width:100% !important;
  height:100% !important;
}

/* RIGHT STACK */
.right{
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:8px;
}

/* BOTTOM */
.bottom{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:8px;
  height:30vh;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th,td{
  padding:6px;
  text-align:center;
}

th{
  background: rgba(255,255,255,0.1);
}

.rank{
  padding:4px 8px;
  border-radius:50%;
}

.r1{background:#2ecc71;}
.r2{background:#f1c40f;}
.r3{background:#e67e22;}

</style>
</head>

<body>

<h1>Q1 COMPLIANCE DASHBOARD</h1>

<!-- KPI -->
<div class="kpi">
  <div class="card"><span>48.98%</span><br>Performance</div>
  <div class="card green"><span>42.86%</span><br>Compliance</div>
  <div class="card"><span>35.71%</span><br>On-Time</div>
  <div class="card yellow"><span>7.14%</span><br>Late</div>
  <div class="card red"><span>57.14%</span><br>Not Submitted</div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT -->
  <div class="panel">
    <h3>Performance by Office</h3>
    <canvas id="bar"></canvas>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="panel">
      <h3>Submission Ranking</h3>
      <table>
        <tr>
          <th>Office</th>
          <th>%</th>
          <th>Rank</th>
        </tr>
        <tr>
          <td>ER</td>
          <td>98.89%</td>
          <td><span class="rank r1">1</span></td>
        </tr>
        <tr>
          <td>PETRU</td>
          <td>42%</td>
          <td><span class="rank r2">2</span></td>
        </tr>
        <tr>
          <td>BILLING</td>
          <td>100%</td>
          <td><span class="rank r3">3</span></td>
        </tr>
      </table>
    </div>

    <div class="panel">
      <h3>Compliance Status</h3>
      <canvas id="pie2"></canvas>
    </div>

  </div>

</div>

<!-- BOTTOM -->
<div class="bottom">

  <div class="panel">
    <h3>Category</h3>
    <canvas id="pie1"></canvas>
  </div>

  <div class="panel">
    <h3>Submission Status</h3>
    <canvas id="pie3"></canvas>
  </div>

</div>

<script>
// BAR
new Chart(bar,{
  type:'bar',
  data:{
    labels:["Admin","Billing","ER","IPCU","Nursing"],
    datasets:[{data:[0,100,98,100,95]}]
  },
  options:{indexAxis:'y'}
});

// PIE CATEGORY
new Chart(pie1,{
  type:'pie',
  data:{
    labels:["Support","Core","Strategic"],
    datasets:[{data:[48,30,22]}]
  }
});

// PIE STATUS
new Chart(pie2,{
  type:'doughnut',
  data:{
    labels:["On-Time","Late"],
    datasets:[{data:[80,20]}]
  }
});

// PIE SUBMISSION
new Chart(pie3,{
  type:'pie',
  data:{
    labels:["Reported","Not Submitted"],
    datasets:[{data:[40,60]}]
  }
});
</script>

</body>
</html>
